<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Exercise Library — RepUp</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#00E5FF"/>
  <link rel="icon" type="image/svg+xml" href="icon.svg"/>
  <link rel="stylesheet" href="style.css?v=16"/>
  <style>
    html,body { height:100%; }
    body { padding-bottom: calc(72px + env(safe-area-inset-bottom)); }

    /* ── STICKY SEARCH + FILTERS ── */
    .lib-sticky {
      position: sticky;
      top: 0;
      z-index: 15;
      background: rgba(4,7,15,.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 10px 15px 8px;
    }
    .lib-search-box {
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--card2);
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      padding: 0 14px;
      margin-bottom: 10px;
      transition: border-color .18s, box-shadow .18s;
    }
    .lib-search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,.12);
    }
    .lib-search-icon { font-size:.95rem; opacity:.45; flex-shrink:0; }
    #lib-q {
      flex:1; background:none; border:none; outline:none;
      color:var(--t1); font-size:.88rem; padding:11px 0;
      box-shadow:none; border-radius:0;
    }
    #lib-q::placeholder { color:var(--t3); }

    .lib-ftabs {
      display:flex; gap:6px; overflow-x:auto;
      scrollbar-width:none; padding-bottom:2px;
    }
    .lib-ftabs::-webkit-scrollbar { display:none; }
    .lib-ftab {
      flex-shrink:0; padding:7px 15px; border-radius:20px;
      border:1.5px solid var(--border2); background:var(--card);
      color:var(--muted); font-size:.74rem; font-weight:700;
      cursor:pointer; transition:all .17s; font-family:inherit;
      white-space:nowrap; touch-action:manipulation;
      -webkit-user-select:none; user-select:none;
    }
    .lib-ftab.on {
      background:var(--grad); color:#000;
      border-color:transparent; box-shadow:var(--sh-accent);
    }
    .lib-ftab:hover:not(.on) { border-color:rgba(0,229,255,.4); color:var(--accent); }

    /* ── BALANCE CARD ── */
    .balance-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r); padding:13px 15px; margin-bottom:14px;
      box-shadow:var(--sh-card);
    }
    .balance-title {
      font-size:.6rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.8px; color:var(--muted); margin-bottom:9px;
    }
    .balance-chips { display:flex; gap:6px; flex-wrap:wrap; }
    .bal-chip {
      display:flex; align-items:center; gap:4px;
      padding:4px 11px; border-radius:99px;
      font-size:.68rem; font-weight:700;
      background:var(--card2); border:1.5px solid var(--border2);
      color:var(--muted); text-transform:capitalize;
      transition:all .2s;
    }
    .bal-chip.done {
      background:rgba(90,254,154,.12);
      border-color:rgba(90,254,154,.35);
      color:var(--green);
    }
    .bal-chip.partial {
      background:rgba(245,255,0,.09);
      border-color:rgba(245,255,0,.28);
      color:var(--gold);
    }

    /* ── EXERCISE ITEMS ── */
    .ex-item {
      background:var(--card); border:1px solid var(--border);
      border-radius:var(--r-lg); margin-bottom:10px;
      overflow:hidden; transition:border-color .18s;
      box-shadow:var(--sh-card);
    }
    .ex-item:hover { border-color:var(--border2); }
    .ex-item.open { border-color:rgba(0,229,255,.3); }

    .ex-collapsed {
      display:flex; align-items:center; gap:11px;
      padding:13px 14px; cursor:pointer;
    }
    .ex-ico {
      width:42px; height:42px; border-radius:12px;
      background:var(--card2); border:1px solid var(--border2);
      display:flex; align-items:center; justify-content:center;
      font-size:1.25rem; flex-shrink:0;
    }
    .ex-meta { flex:1; min-width:0; }
    .ex-name { font-size:.93rem; font-weight:800; letter-spacing:-.1px; color:#fff; margin-bottom:2px; }
    .ex-grp-tag {
      display:inline-block; font-size:.6rem; font-weight:800;
      text-transform:uppercase; letter-spacing:.07em;
      padding:2px 8px; border-radius:8px;
      background:var(--card2); color:var(--t3); margin-bottom:4px;
    }
    .ex-chips-row { display:flex; flex-wrap:wrap; gap:3px; }
    .cchip { font-size:.6rem; font-weight:700; padding:2px 7px; border-radius:8px; text-transform:uppercase; letter-spacing:.04em; }
    .cchip-p { background:rgba(0,229,255,.15); color:#00E5FF; border:1px solid rgba(0,229,255,.28); }
    .cchip-s { background:rgba(245,255,0,.1); color:#F5FF00; border:1px solid rgba(245,255,0,.22); }
    .ex-arrow { font-size:1.1rem; color:var(--muted); flex-shrink:0; transition:transform .2s, color .2s; }
    .ex-item.open .ex-arrow { transform:rotate(90deg); color:var(--accent); }
    .custom-badge {
      display:inline-block; background:var(--grad); color:#000;
      font-size:.52rem; font-weight:900; padding:1px 6px;
      border-radius:7px; margin-left:5px; vertical-align:middle;
    }

    /* ── EXPANDED BODY ── */
    .ex-body {
      display:none; padding:0 14px 14px;
      border-top:1px solid var(--border);
      background:rgba(0,0,0,.18);
    }
    .ex-item.open .ex-body { display:block; }

    /* SVG muscle diagrams */
    .diagrams { display:flex; gap:8px; padding:12px 0 6px; }
    .diag-wrap { flex:1; display:flex; flex-direction:column; align-items:center; }
    .diag-label { font-size:.56rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--t3); margin-bottom:4px; }
    .diag-wrap svg { width:100%; max-width:130px; height:auto; display:block; }
    .diag-legend { display:flex; gap:14px; padding:0 0 10px; }
    .dleg { display:flex; align-items:center; gap:5px; font-size:.67rem; color:var(--t2); }
    .dleg-dot { width:9px; height:9px; border-radius:50%; }

    /* Form cue sections */
    .ex-section { margin:10px 0 6px; }
    .ex-sec-lbl {
      font-size:.6rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; color:var(--accent); margin-bottom:4px;
    }
    .ex-sec-txt { font-size:.81rem; color:var(--t2); line-height:1.62; }
    .ex-tip-box {
      font-size:.76rem; color:var(--gold); font-style:italic;
      margin:10px 0 12px; padding:9px 13px;
      background:rgba(245,255,0,.07); border-radius:10px;
      border-left:2px solid rgba(245,255,0,.45);
    }
    .ex-chip-row { display:flex; flex-wrap:wrap; gap:4px; margin:4px 0 12px; }
    .ex-sets-lbl { font-size:.7rem; color:var(--t3); margin-top:4px; }

    /* YouTube demo button */
    .yt-btn {
      display:flex; align-items:center; justify-content:center;
      gap:7px; width:100%; padding:10px 14px; border-radius:12px;
      background:rgba(255,60,60,.1); border:1.5px solid rgba(255,80,80,.28);
      color:#FF8888; font-size:.8rem; font-weight:700;
      text-decoration:none; margin-top:12px;
      transition:all .18s; box-sizing:border-box;
    }
    .yt-btn:hover { background:rgba(255,60,60,.2); border-color:rgba(255,80,80,.5); color:#FFAAAA; }
    .yt-icon { font-size:1rem; flex-shrink:0; }

    /* ── EMPTY STATE ── */
    .lib-empty { text-align:center; padding:54px 24px; color:var(--muted); }
    .lib-empty-i { font-size:2.8rem; margin-bottom:12px; opacity:.3; }
    .lib-empty p { font-size:.86rem; line-height:1.6; }

    /* ── ADD CUSTOM FAB ── */
    .lib-fab {
      position:fixed; bottom:calc(80px + env(safe-area-inset-bottom));
      right:18px; z-index:25;
    }
    .lib-fab button {
      width:54px; height:54px; border-radius:50%;
      background:var(--grad); color:#000;
      font-size:1.6rem; font-weight:900; border:none;
      box-shadow:var(--sh-accent), 0 4px 20px rgba(0,0,0,.5);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:transform .2s, box-shadow .2s;
    }
    .lib-fab button:hover { transform:scale(1.08); box-shadow:0 0 40px rgba(0,229,255,.55), 0 4px 24px rgba(0,0,0,.5); }
    .lib-fab button:active { transform:scale(.92); }

    /* ── BOTTOM NAV ── */
    .gnav {
      position:fixed; bottom:0; left:0; right:0;
      display:flex;
      background:rgba(4,7,15,.98);
      backdrop-filter:blur(40px) saturate(200%);
      -webkit-backdrop-filter:blur(40px) saturate(200%);
      border-top:1px solid rgba(0,229,255,.10);
      padding-bottom:calc(4px + env(safe-area-inset-bottom));
      z-index:20;
    }
    .gnav a {
      flex:1; display:flex; flex-direction:column;
      align-items:center; gap:3px; padding:10px 4px 6px;
      color:var(--muted); text-decoration:none;
      font-size:.53rem; font-weight:800; text-transform:uppercase;
      letter-spacing:.65px; position:relative; transition:color .18s;
    }
    .gnav a svg {
      width:23px; height:23px; stroke:currentColor; fill:none;
      stroke-width:1.75; stroke-linecap:round; stroke-linejoin:round;
      transition:transform .28s cubic-bezier(.34,1.56,.64,1);
    }
    .gnav a.on { color:var(--accent); }
    .gnav a.on svg { transform:translateY(-2px) scale(1.12); }
    .gnav a.on::after {
      content:''; position:absolute; top:6px; left:50%;
      transform:translateX(-50%); width:44px; height:36px;
      background:rgba(0,229,255,.12); border-radius:14px; z-index:-1;
    }
    .gnav a.on::before {
      content:''; position:absolute; top:0; left:50%;
      transform:translateX(-50%); width:32px; height:3px;
      background:var(--grad); border-radius:0 0 5px 5px;
      box-shadow:0 0 18px rgba(0,229,255,1), 0 0 36px rgba(0,229,255,.5);
    }

    /* ── CUSTOM EXERCISE DELETE ── */
    .del-custom-btn {
      display:flex; align-items:center; justify-content:center;
      width:100%; margin-top:8px; padding:9px; border-radius:11px;
      background:rgba(255,0,85,.1); color:var(--red);
      border:1px solid rgba(255,0,85,.22); font-size:.79rem;
      font-weight:700; cursor:pointer; font-family:inherit;
      transition:background .15s; touch-action:manipulation;
    }
    .del-custom-btn:hover { background:rgba(255,0,85,.2); }

    /* ── RESPONSIVE ── */
    @media (min-width:768px) {
      .lib-sticky, main {
        padding-left:max(15px, calc((100% - 700px) / 2));
        padding-right:max(15px, calc((100% - 700px) / 2));
      }
      .gnav {
        padding-left:max(0px, calc((100% - 700px) / 2));
        padding-right:max(0px, calc((100% - 700px) / 2));
      }
    }
    @media (min-width:1024px) {
      .lib-sticky, main {
        padding-left:max(24px, calc((100% - 880px) / 2));
        padding-right:max(24px, calc((100% - 880px) / 2));
      }
      .gnav {
        padding-left:max(0px, calc((100% - 880px) / 2));
        padding-right:max(0px, calc((100% - 880px) / 2));
      }
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div style="display:flex;align-items:center;gap:11px">
      <a href="./repup.html" class="dbk" style="text-decoration:none;display:flex;align-items:center;justify-content:center">←</a>
      <div class="logo" style="font-size:1.25rem">Exercise Library</div>
    </div>
    <div id="profile-chip" style="font-size:.75rem;font-weight:700;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:4px 10px"></div>
  </header>

  <!-- Sticky search + filters -->
  <div class="lib-sticky">
    <div class="lib-search-box">
      <span class="lib-search-icon">🔍</span>
      <input id="lib-q" type="search" placeholder="Search exercises, muscles, groups…" autocomplete="off"/>
    </div>
    <div class="lib-ftabs" id="lib-ftabs">
      <button class="lib-ftab on" data-lf="all">All</button>
      <button class="lib-ftab" data-lf="custom">⭐ My Custom</button>
      <button class="lib-ftab" data-lf="chest">Chest</button>
      <button class="lib-ftab" data-lf="back">Back</button>
      <button class="lib-ftab" data-lf="shoulders">Shoulders</button>
      <button class="lib-ftab" data-lf="arms">Arms</button>
      <button class="lib-ftab" data-lf="legs">Legs</button>
      <button class="lib-ftab" data-lf="core">Core</button>
    </div>
  </div>

  <main id="mscroll" style="padding:14px 15px 10px; overflow-y:auto; flex:1;">

    <!-- Weekly muscle balance -->
    <div class="balance-card">
      <div class="balance-title">📊 This Week's Muscle Coverage</div>
      <div class="balance-chips" id="balance-chips"></div>
    </div>

    <!-- Exercise list -->
    <div id="ex-list"></div>

  </main>

  <!-- Floating add button -->
  <div class="lib-fab">
    <button id="lib-add-btn" title="Add Custom Exercise">+</button>
  </div>

  <nav class="gnav">
    <a href="./repup.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home
    </a>
    <a href="./library.html" class="on">
      <svg viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 016.5 2H20v20H6.5a2.5 2.5 0 010-5H20"/></svg>Library
    </a>
    <a href="./vault.html">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>Vault
    </a>
    <a href="./progress.html">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progress
    </a>
    <a href="./planner.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Plan
    </a>
  </nav>

</div>

<!-- ══ ADD CUSTOM EXERCISE MODAL ══ -->
<div class="overlay hidden" id="m-custom">
  <div class="sheet">
    <div class="drag"></div>
    <h2 id="m-custom-h">Add Custom Exercise</h2>

    <div style="display:grid;grid-template-columns:1fr 72px;gap:9px">
      <div class="fg">
        <label>Exercise Name</label>
        <input id="inp-cx-name" type="text" placeholder="e.g. Pause Squat" maxlength="60"/>
      </div>
      <div class="fg">
        <label>Icon</label>
        <input id="inp-cx-icon" type="text" placeholder="🏋️" maxlength="4" style="text-align:center;font-size:1.2rem"/>
      </div>
    </div>

    <div class="fg">
      <label>Muscle Group</label>
      <select id="inp-cx-group">
        <option value="chest">Chest</option>
        <option value="back">Back</option>
        <option value="shoulders">Shoulders</option>
        <option value="arms">Arms</option>
        <option value="legs">Legs</option>
        <option value="core">Core</option>
        <option value="other">Other / Full Body</option>
      </select>
    </div>

    <div class="fg">
      <label>Primary Muscles (comma-separated)</label>
      <input id="inp-cx-primary" type="text" placeholder="e.g. Chest, Front Delts, Triceps"/>
    </div>
    <div class="fg">
      <label>Secondary Muscles (optional)</label>
      <input id="inp-cx-secondary" type="text" placeholder="e.g. Core, Biceps"/>
    </div>
    <div class="fg">
      <label>Setup &amp; Starting Position</label>
      <textarea id="inp-cx-setup" rows="2" placeholder="Describe how to set up for this exercise…"></textarea>
    </div>
    <div class="fg">
      <label>Execution &amp; Form Cues</label>
      <textarea id="inp-cx-exec" rows="3" placeholder="Step-by-step execution with key coaching cues…"></textarea>
    </div>
    <div class="fg">
      <label>Pro Tip (optional)</label>
      <input id="inp-cx-tip" type="text" placeholder="One key insight that makes the biggest difference…" maxlength="140"/>
    </div>
    <div class="fg">
      <label>Default Sets × Reps</label>
      <input id="inp-cx-sets" type="text" placeholder="e.g. 3 × 8–12" maxlength="30"/>
    </div>

    <div class="sacts">
      <button class="btn btn-g" id="btn-cancel-custom">Cancel</button>
      <button class="btn btn-o" id="btn-save-custom">Save Exercise</button>
    </div>
  </div>
</div>

  var raw = localStorage.getItem(sk(name));
  return raw ? JSON.parse(raw) : { workouts:[], log:[], sched:{}, library:{} };
}

function makeSVG(muscles, view){
  var map = view === 'front' ? FP : BP;
  var o = '';
  var keys = Object.keys(muscles);
  for(var i=0;i<keys.length;i++){
    var k=keys[i]; if(!map[k]) continue;
    var t=muscles[k];
    var fill=t==='p'?'rgba(0,229,255,.85)':'rgba(245,255,0,.55)';
    var stroke=t==='p'?'rgba(0,229,255,1)':'rgba(245,255,0,.8)';
    o+='<path d="'+map[k]+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="0.6" opacity="0.92"/>';
  }
  return '<svg viewBox="0 0 100 285" xmlns="http://www.w3.org/2000/svg">'+BASE+o+'</svg>';
}

// ─── BALANCE TRACKER ─────────────────────────────────────────────────────────
var GROUPS = ['chest','back','shoulders','arms','legs','core'];
var GRUP_ICONS = { chest:'💪', back:'🔙', shoulders:'🙌', arms:'💪', legs:'🦵', core:'🔥' };
var GRUP_LABELS = { chest:'Chest', back:'Back', shoulders:'Shoulders', arms:'Arms', legs:'Legs', core:'Core' };

function renderBalance(){
  var trained = {};
  var weekStart = new Date();
  weekStart.setHours(0,0,0,0);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());

  S.log.forEach(function(entry){
    if(new Date(entry.date) < weekStart) return;
    entry.exercises.forEach(function(e){
      if(!e.done) return;
      var found = DB.find(function(ex){ return ex.name.toLowerCase() === e.name.toLowerCase(); });
      if(found) trained[found.group] = (trained[found.group] || 0) + 1;
      var cf = getCustoms().find(function(ex){ return ex.name.toLowerCase() === e.name.toLowerCase(); });
      if(cf) trained[cf.group] = (trained[cf.group] || 0) + 1;
    });
  });

  var html = '';
  GROUPS.forEach(function(g){
    var n = trained[g] || 0;
    var cls = n >= 2 ? 'done' : n === 1 ? 'partial' : '';
    var mark = n >= 2 ? ' ✓' : n === 1 ? ' ~' : '';
    html += '<div class="bal-chip ' + cls + '">' + GRUP_ICONS[g] + ' ' + GRUP_LABELS[g] + mark + '</div>';
  });
  ge('balance-chips').innerHTML = html;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
var libFilter = 'all', libSearch = '';

function chipHTML(list, type){
  return (list||[]).map(function(m){ return '<span class="cchip cchip-'+type+'">'+esc(m)+'</span>'; }).join('');
}

function ytURL(name){
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' exercise form tutorial');
}

function cardHTML(ex){
  var priC = chipHTML(ex.primary, 'p');
  var secC = chipHTML(ex.secondary, 's');
  var hasSVG = ex.muscles && Object.keys(ex.muscles).length > 0;

  var body = '';
  if(hasSVG){
    body += '<div class="diagrams">' +
      '<div class="diag-wrap"><div class="diag-label">Front</div>' + makeSVG(ex.muscles,'front') + '</div>' +
      '<div class="diag-wrap"><div class="diag-label">Back</div>'  + makeSVG(ex.muscles,'back')  + '</div>' +
      '</div>';
    if((ex.secondary||[]).length){
      body += '<div class="diag-legend"><div class="dleg"><div class="dleg-dot" style="background:#00E5FF"></div>Primary</div><div class="dleg"><div class="dleg-dot" style="background:rgba(245,255,0,.65)"></div>Secondary</div></div>';
    } else {
      body += '<div class="diag-legend"><div class="dleg"><div class="dleg-dot" style="background:#00E5FF"></div>Primary</div></div>';
    }
  }
  body += '<div class="ex-chip-row">' + priC + secC + '</div>';
  if(ex.setup) body += '<div class="ex-section"><div class="ex-sec-lbl">Setup</div><div class="ex-sec-txt">' + esc(ex.setup) + '</div></div>';
  if(ex.exec)  body += '<div class="ex-section"><div class="ex-sec-lbl">Execution &amp; Form Cues</div><div class="ex-sec-txt">' + esc(ex.exec)  + '</div></div>';
  if(ex.tip)   body += '<div class="ex-tip-box">💡 ' + esc(ex.tip) + '</div>';
  body += '<a href="' + ytURL(ex.name) + '" target="_blank" rel="noopener" class="yt-btn"><span class="yt-icon">▶</span> Watch Demo on YouTube</a>';
  if(ex.sets)  body += '<div class="ex-sets-lbl">Recommended: ' + esc(ex.sets) + '</div>';
  if(ex.custom) body += '<button class="del-custom-btn" data-del="' + esc(ex.id) + '">🗑 Delete This Exercise</button>';

  var badge = ex.custom ? ' <span class="custom-badge">CUSTOM</span>' : '';

  return '<div class="ex-item" data-id="' + esc(ex.id||ex.name) + '">' +
    '<div class="ex-collapsed">' +
      '<div class="ex-ico">' + esc(ex.icon||'🏋️') + '</div>' +
      '<div class="ex-meta">' +
        '<div class="ex-name">' + esc(ex.name) + badge + '</div>' +
        '<div class="ex-grp-tag">' + esc(GRUP_LABELS[ex.group]||ex.group||'') + '</div>' +
        '<div class="ex-chips-row">' + priC + '</div>' +
      '</div>' +
      '<div class="ex-arrow">›</div>' +
    '</div>' +
    '<div class="ex-body">' + body + '</div>' +
  '</div>';
}

function renderList(){
  var q = libSearch.toLowerCase();
  var customs = getCustoms().map(function(e){ return Object.assign({}, e, {custom:true}); });
  var all = customs.concat(DB);

  var filtered = all.filter(function(ex){
    if(libFilter === 'custom') return !!ex.custom;
    if(libFilter !== 'all' && ex.group !== libFilter) return false;
    if(!q) return true;
    return ex.name.toLowerCase().indexOf(q) > -1 ||
           (ex.primary||[]).some(function(m){ return m.toLowerCase().indexOf(q) > -1; }) ||
           (ex.secondary||[]).some(function(m){ return m.toLowerCase().indexOf(q) > -1; }) ||
           (ex.group||'').indexOf(q) > -1;
  });

  var container = ge('ex-list');
  if(!filtered.length){
    var msg = libFilter === 'custom'
      ? 'No custom exercises yet.<br>Tap <b>+</b> to add your own exercises.'
      : 'No exercises match your search.';
    container.innerHTML = '<div class="lib-empty"><div class="lib-empty-i">' + (libFilter==='custom'?'⭐':'🔍') + '</div><p>' + msg + '</p></div>';
    return;
  }

  container.innerHTML = filtered.map(cardHTML).join('');

  // Expand / collapse
  container.querySelectorAll('.ex-collapsed').forEach(function(head){
    head.addEventListener('click', function(){
      var item = head.closest('.ex-item');
      var wasOpen = item.classList.contains('open');
      container.querySelectorAll('.ex-item.open').forEach(function(c){ c.classList.remove('open'); });
      if(!wasOpen) item.classList.add('open');
    });
  });

  // Delete custom
  container.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      var name = btn.closest('.ex-item').querySelector('.ex-name').textContent.replace('CUSTOM','').trim();
      if(!confirm('Delete "' + name + '"?')) return;
      saveCustoms(getCustoms().filter(function(ex){ return ex.id !== btn.dataset.del; }));
      renderList();
    });
  });
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
ge('lib-q').addEventListener('input', function(){
  libSearch = this.value.trim();
  renderList();
});

ge('lib-ftabs').addEventListener('click', function(e){
  var btn = e.target.closest('.lib-ftab');
  if(!btn) return;
  document.querySelectorAll('.lib-ftab').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  libFilter = btn.dataset.lf;
  renderList();
});

// ─── CUSTOM EXERCISE MODAL ───────────────────────────────────────────────────
var editingId = null;

function openCustomModal(ex){
  editingId = ex ? ex.id : null;
  ge('m-custom-h').textContent = ex ? 'Edit Exercise' : 'Add Custom Exercise';
  ge('inp-cx-name').value     = ex ? ex.name    : '';
  ge('inp-cx-icon').value     = ex ? ex.icon    : '';
  ge('inp-cx-group').value    = ex ? ex.group   : 'chest';
  ge('inp-cx-primary').value  = ex ? (ex.primary||[]).join(', ')   : '';
  ge('inp-cx-secondary').value= ex ? (ex.secondary||[]).join(', ') : '';
  ge('inp-cx-setup').value    = ex ? ex.setup   : '';
  ge('inp-cx-exec').value     = ex ? ex.exec    : '';
  ge('inp-cx-tip').value      = ex ? ex.tip     : '';
  ge('inp-cx-sets').value     = ex ? ex.sets    : '';
  ge('m-custom').classList.remove('hidden');
  setTimeout(function(){ ge('inp-cx-name').focus(); }, 80);
}

ge('lib-add-btn').addEventListener('click', function(){ openCustomModal(null); });

ge('btn-cancel-custom').addEventListener('click', function(){
  ge('m-custom').classList.add('hidden');
});

ge('btn-save-custom').addEventListener('click', function(){
  var name = ge('inp-cx-name').value.trim();
  if(!name){ ge('inp-cx-name').focus(); return; }

  var ex = {
    id:       editingId || uid(),
    name:     name,
    icon:     ge('inp-cx-icon').value.trim() || '🏋️',
    group:    ge('inp-cx-group').value,
    primary:  ge('inp-cx-primary').value.split(',').map(function(s){ return s.trim(); }).filter(Boolean),
    secondary:ge('inp-cx-secondary').value.split(',').map(function(s){ return s.trim(); }).filter(Boolean),
    setup:    ge('inp-cx-setup').value.trim(),
    exec:     ge('inp-cx-exec').value.trim(),
    tip:      ge('inp-cx-tip').value.trim(),
    sets:     ge('inp-cx-sets').value.trim() || '3 × 10',
    muscles:  {},
    custom:   true,
  };

  var customs = getCustoms();
  if(editingId){
    var idx = customs.findIndex(function(c){ return c.id === editingId; });
    if(idx > -1) customs[idx] = ex; else customs.unshift(ex);
  } else {
    customs.unshift(ex);
  }
  saveCustoms(customs);
  ge('m-custom').classList.add('hidden');
  if(libFilter === 'all' || libFilter === 'custom' || libFilter === ex.group) renderList();
});

// Close on backdrop click
ge('m-custom').addEventListener('click', function(e){
  if(e.target === ge('m-custom')) ge('m-custom').classList.add('hidden');
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') ge('m-custom').classList.add('hidden');
});

// ─── INIT ────────────────────────────────────────────────────────────────────
renderBalance();
renderList();
</script>
